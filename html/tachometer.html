<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>BeamUI Tachometer</title>
    <link rel="stylesheet" href="tachometer.css">
</head>
<body>
    <div class="tachometer-container">
        <!-- Embedded SVG tachometer -->
        <svg id="tachometer" class="tachometer-svg" width="257" height="318" viewBox="0 0 257 318" fill="none" xmlns="http://www.w3.org/2000/svg">
            <!-- SVG content will be loaded here -->
            <g id="needle-group" data-needle>
                <!-- Needle element for rotation -->
            </g>
            <g id="rpm-display" data-rpm-display>
                <!-- RPM text display -->
            </g>
        </svg>
    </div>
    <script src="tachometer.js"></script>
</body>
</html>
